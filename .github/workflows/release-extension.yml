name: Release Extension

# 自动发布浏览器扩展到 Releases，版本号自动递增：
#   - 改动 extension/** 推到 main（或手动 Run workflow）即触发
#   - major.minor 取自 extension/manifest.json 的 version 字段
#   - patch 自动递增：找现有最大的 vMAJOR.MINOR.x 再 +1；没有则用 manifest 里的 patch
#   - 递增后的版本只注入到打进 zip 的 manifest（不回写仓库，避免触发循环）
# 想升 minor/major：手动把 manifest.json 的 version 改成 1.1.0 之类，CI 会从新号段继续自增。

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version
        id: meta
        run: |
          set -euo pipefail
          MAJOR=$(jq -r '.version | split(".")[0]' extension/manifest.json)
          MINOR=$(jq -r '.version | split(".")[1] // "0"' extension/manifest.json)
          MPATCH=$(jq -r '.version | split(".")[2] // "0"' extension/manifest.json)
          if [ -z "$MAJOR" ] || [ "$MAJOR" = "null" ]; then
            echo "::error::extension/manifest.json 里没有读到 version" && exit 1
          fi
          ESC="v${MAJOR}\.${MINOR}\."
          MAXP=$(gh api "repos/${GITHUB_REPOSITORY}/tags" --paginate -q '.[].name' \
            | grep -E "^${ESC}[0-9]+$" \
            | sed -E "s/^${ESC}//" \
            | sort -n | tail -1 || true)
          if [ -z "${MAXP:-}" ]; then
            NEXTP="$MPATCH"
          else
            NEXTP=$((MAXP + 1))
          fi
          VERSION="${MAJOR}.${MINOR}.${NEXTP}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "下一个版本：v$VERSION"

      - name: Inject version & package
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          jq --arg v "${{ steps.meta.outputs.version }}" '.version=$v' extension/manifest.json > "$tmp"
          mv "$tmp" extension/manifest.json
          ZIP="browser-skill-extension-${{ steps.meta.outputs.tag }}.zip"
          cd extension
          zip -r "../$ZIP" . -x "*.DS_Store" -x "__MACOSX/*"
          cd ..
          echo "打包完成：$ZIP"
          unzip -l "$ZIP"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: browser-skill extension ${{ steps.meta.outputs.tag }}
          files: browser-skill-extension-${{ steps.meta.outputs.tag }}.zip
          body: |
            浏览器扩展桥接（Manifest V3 · chrome.debugger 驱动 · 彩色会话隔离）。

            ### 安装（加载已解压的扩展）
            1. 下载并解压下方的 `browser-skill-extension-${{ steps.meta.outputs.tag }}.zip`
            2. 打开 `chrome://extensions`，开启右上角「开发者模式」
            3. 点「加载已解压的扩展程序」，选择解压出来的文件夹
            4. 按 skill README 启动本地桥接脚本（`scripts/ext-bridge.mjs`）

            > 提示：Chrome 不支持直接安装 zip / crx，非商店扩展需用「加载已解压」方式，必须先解压再选文件夹。
